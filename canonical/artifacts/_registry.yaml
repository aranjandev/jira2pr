# Artifacts Registry — metadata for the agent artifact tracking concept.
#
# The artifacts/ folder contains the schema for the repo-level artifact registry.
# SCHEMA.md is generated by the assembler into .github/artifacts/SCHEMA.md.
# The registry itself (REGISTRY.md) is agent-managed and NOT generated by the assembler —
# this ensures re-running the assembler never overwrites accumulated history.
#
# Fields:
#   name        — Display name for this concept
#   description — One-sentence purpose statement

artifacts:
  name: Artifact Registry
  description: >
    Repo-level append-only log of significant outputs produced by agent workflows.
    Provides a bird's-eye view of all completed work across the repository's lifetime.

files:
  - filename: SCHEMA.md
    description: Schema reference and field definitions for the artifact registry
